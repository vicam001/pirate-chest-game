name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Convert WAV audio to OGG
        run: |
          find assets/audio -name '*.wav' -print0 | while IFS= read -r -d '' f; do
            ffmpeg -y -i "$f" "${f%.wav}.ogg" && rm "$f"
          done

      - name: Update audio references to OGG
        run: |
          find . -name '*.py' -not -path './build/*' -print0 | xargs -0 sed -i 's/\.wav/.ogg/g'

      - name: Install pygbag
        run: pip install pygbag

      - name: Build with pygbag
        run: python -m pygbag --build .

      - name: Add .nojekyll
        run: touch build/web/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
