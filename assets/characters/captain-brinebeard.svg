<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Captain Brinebeard</title>
  <desc id="desc">Warm puppet-like pirate captain with stitched coat, glossy eyes and a heroic grin for young players.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#8be5ff"/>
      <stop offset="100%" stop-color="#1f5f93"/>
    </radialGradient>
    <linearGradient id="coat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d24736"/>
      <stop offset="100%" stop-color="#8c241a"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8d7b6"/>
      <stop offset="100%" stop-color="#ebb98f"/>
    </linearGradient>
    <filter id="felt" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="alphaNoise">
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="alphaNoise" mode="multiply"/>
    </filter>
    <filter id="softshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#102a42" flood-opacity="0.35"/>
    </filter>
  </defs>

  <circle cx="512" cy="512" r="470" fill="url(#bg)"/>
  <circle cx="512" cy="512" r="458" fill="none" stroke="#f5df8e" stroke-width="14" stroke-dasharray="7 16" opacity="0.9"/>

  <g filter="url(#softshadow)">
    <ellipse cx="512" cy="790" rx="306" ry="170" fill="url(#coat)" filter="url(#felt)"/>
    <path d="M320 820 Q512 760 704 820" stroke="#f4d88c" stroke-width="10" stroke-linecap="round" stroke-dasharray="1 17"/>

    <ellipse cx="512" cy="560" rx="246" ry="224" fill="url(#skin)" filter="url(#felt)"/>
    <ellipse cx="512" cy="616" rx="120" ry="76" fill="#e8a57b" opacity="0.35"/>

    <path d="M252 430 Q512 218 772 430 Q760 310 678 258 Q592 204 512 226 Q432 204 346 258 Q264 310 252 430Z" fill="#33251e"/>
    <path d="M356 290 Q512 166 668 290 L698 340 Q512 248 326 340Z" fill="#4b372c"/>
    <rect x="444" y="294" width="136" height="52" rx="14" fill="#efc64d"/>
    <rect x="464" y="308" width="96" height="24" rx="10" fill="#8d6a22" opacity="0.55"/>

    <ellipse cx="420" cy="524" rx="40" ry="52" fill="#fffef7"/>
    <ellipse cx="604" cy="524" rx="40" ry="52" fill="#fffef7"/>
    <circle cx="424" cy="528" r="18" fill="#11314b"/>
    <circle cx="600" cy="528" r="18" fill="#11314b"/>
    <circle cx="430" cy="518" r="7" fill="#ffffff"/>
    <circle cx="606" cy="518" r="7" fill="#ffffff"/>

    <path d="M374 480 Q422 454 468 480" stroke="#613b28" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M556 480 Q602 454 650 480" stroke="#613b28" stroke-width="10" fill="none" stroke-linecap="round"/>

    <ellipse cx="512" cy="588" rx="28" ry="22" fill="#d8895f"/>
    <path d="M400 646 Q512 732 624 646" fill="#7d2a1f"/>
    <rect x="450" y="650" width="124" height="34" rx="11" fill="#fff4dd"/>
    <line x1="482" y1="650" x2="482" y2="684" stroke="#d6b493" stroke-width="3"/>
    <line x1="512" y1="650" x2="512" y2="684" stroke="#d6b493" stroke-width="3"/>
    <line x1="542" y1="650" x2="542" y2="684" stroke="#d6b493" stroke-width="3"/>

    <path d="M340 640 Q512 888 684 640" fill="#935731" filter="url(#felt)"/>
    <path d="M370 684 Q512 846 654 684" stroke="#c2814b" stroke-width="18" fill="none" stroke-linecap="round"/>
    <path d="M378 726 Q512 872 646 726" stroke="#d89b62" stroke-width="14" fill="none" stroke-linecap="round"/>

    <circle cx="322" cy="624" r="50" fill="url(#skin)"/>
    <circle cx="702" cy="624" r="50" fill="url(#skin)"/>
    <path d="M735 600 l70 -42" stroke="#f0cf61" stroke-width="15" stroke-linecap="round"/>
    <circle cx="814" cy="554" r="22" fill="#f0cf61"/>
  </g>
</svg>
