<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Cooky Morgan</title>
  <desc id="desc">Energetic ship cook pirate with cozy puppet textures, flour hat and a silly proud smile.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="34%" r="70%">
      <stop offset="0%" stop-color="#fff1c4"/>
      <stop offset="100%" stop-color="#c69434"/>
    </radialGradient>
    <linearGradient id="coat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9250af"/>
      <stop offset="100%" stop-color="#592c72"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2c79f"/>
      <stop offset="100%" stop-color="#e3ac82"/>
    </linearGradient>
    <filter id="felt" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="23" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="alphaNoise"><feFuncA type="table" tableValues="0 0.08"/></feComponentTransfer>
      <feBlend in="SourceGraphic" in2="alphaNoise" mode="multiply"/>
    </filter>
    <filter id="softshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#6e5210" flood-opacity="0.34"/>
    </filter>
  </defs>

  <circle cx="512" cy="512" r="470" fill="url(#bg)"/>
  <circle cx="512" cy="512" r="458" fill="none" stroke="#f7e28f" stroke-width="14" stroke-dasharray="7 16"/>

  <g filter="url(#softshadow)">
    <ellipse cx="512" cy="792" rx="304" ry="168" fill="url(#coat)" filter="url(#felt)"/>
    <path d="M324 820 Q512 762 700 820" stroke="#f2dfc6" stroke-width="10" stroke-linecap="round" stroke-dasharray="1 17"/>

    <ellipse cx="512" cy="560" rx="242" ry="222" fill="url(#skin)" filter="url(#felt)"/>

    <path d="M306 436 Q512 300 718 436 Q694 338 632 288 Q580 250 512 258 Q444 250 392 288 Q330 338 306 436Z" fill="#83242a"/>
    <circle cx="512" cy="322" r="42" fill="#fbf4e0"/>
    <circle cx="474" cy="336" r="30" fill="#fbf4e0"/>
    <circle cx="550" cy="336" r="30" fill="#fbf4e0"/>

    <path d="M350 430 C358 362, 408 330, 442 354" stroke="#5c382d" stroke-width="17" fill="none" stroke-linecap="round"/>
    <path d="M674 430 C666 362, 616 330, 582 354" stroke="#5c382d" stroke-width="17" fill="none" stroke-linecap="round"/>

    <ellipse cx="422" cy="528" rx="38" ry="50" fill="#fffef8"/>
    <ellipse cx="602" cy="528" rx="38" ry="50" fill="#fffef8"/>
    <circle cx="426" cy="532" r="17" fill="#15243f"/>
    <circle cx="598" cy="532" r="17" fill="#15243f"/>
    <circle cx="432" cy="522" r="7" fill="#fff"/>
    <circle cx="604" cy="522" r="7" fill="#fff"/>

    <ellipse cx="512" cy="594" rx="24" ry="18" fill="#d07b57"/>
    <path d="M392 664 Q512 758 632 664" fill="#8e2c22"/>
    <rect x="456" y="670" width="112" height="32" rx="10" fill="#fff0dc"/>

    <circle cx="314" cy="568" r="48" fill="url(#skin)"/>
    <circle cx="710" cy="568" r="48" fill="url(#skin)"/>
    <path d="M742 590 l80 46" stroke="#cad5d8" stroke-width="16" stroke-linecap="round"/>
    <ellipse cx="834" cy="642" rx="40" ry="20" fill="#cad5d8"/>
  </g>
</svg>
