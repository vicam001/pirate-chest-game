<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">First Mate Laughing Lucy</title>
  <desc id="desc">Friendly puppet-style first mate with striped scarf, bright eyes and contagious laughter.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="34%" r="70%">
      <stop offset="0%" stop-color="#ffe08f"/>
      <stop offset="100%" stop-color="#df7f2e"/>
    </radialGradient>
    <linearGradient id="vest" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2f94a3"/>
      <stop offset="100%" stop-color="#1a5d67"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8d6b4"/>
      <stop offset="100%" stop-color="#ebb793"/>
    </linearGradient>
    <pattern id="stripes" width="24" height="24" patternUnits="userSpaceOnUse" patternTransform="rotate(25)">
      <rect width="24" height="24" fill="#be3a30"/>
      <rect width="12" height="24" fill="#f8e8c8"/>
    </pattern>
    <filter id="felt" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="11" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="alphaNoise">
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="alphaNoise" mode="multiply"/>
    </filter>
    <filter id="softshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#6d3510" flood-opacity="0.34"/>
    </filter>
  </defs>

  <circle cx="512" cy="512" r="470" fill="url(#bg)"/>
  <circle cx="512" cy="512" r="458" fill="none" stroke="#f8e69b" stroke-width="14" stroke-dasharray="7 16" opacity="0.9"/>

  <g filter="url(#softshadow)">
    <ellipse cx="512" cy="792" rx="304" ry="168" fill="url(#vest)" filter="url(#felt)"/>
    <path d="M324 820 Q512 760 700 820" stroke="#f7e3b9" stroke-width="10" stroke-linecap="round" stroke-dasharray="1 17"/>

    <ellipse cx="512" cy="560" rx="242" ry="220" fill="url(#skin)" filter="url(#felt)"/>
    <path d="M290 450 Q512 290 734 450 L714 514 Q664 450 598 422 Q534 394 512 394 Q490 394 426 422 Q360 450 310 514Z" fill="url(#stripes)"/>

    <path d="M336 414 Q358 308 440 252 Q484 222 512 232 Q540 222 584 252 Q666 308 688 414" stroke="#32211a" stroke-width="14" fill="none" stroke-linecap="round"/>

    <ellipse cx="424" cy="528" rx="38" ry="50" fill="#fffef8"/>
    <ellipse cx="600" cy="528" rx="38" ry="50" fill="#fffef8"/>
    <circle cx="427" cy="532" r="17" fill="#15243f"/>
    <circle cx="597" cy="532" r="17" fill="#15243f"/>
    <circle cx="433" cy="522" r="7" fill="#ffffff"/>
    <circle cx="603" cy="522" r="7" fill="#ffffff"/>

    <path d="M374 486 Q420 456 470 486" stroke="#6f432c" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M554 486 Q604 456 650 486" stroke="#6f432c" stroke-width="10" fill="none" stroke-linecap="round"/>
    <ellipse cx="512" cy="590" rx="26" ry="20" fill="#dc8a61"/>

    <path d="M394 650 Q512 744 630 650" fill="#9c2c1f"/>
    <rect x="448" y="654" width="128" height="36" rx="11" fill="#fff4df"/>
    <path d="M420 628 Q512 700 604 628" stroke="#862117" stroke-width="8" fill="none" stroke-linecap="round"/>

    <circle cx="316" cy="566" r="48" fill="url(#skin)"/>
    <circle cx="708" cy="566" r="48" fill="url(#skin)"/>
    <circle cx="292" cy="572" r="20" fill="none" stroke="#f2d26f" stroke-width="9"/>
    <circle cx="732" cy="572" r="20" fill="none" stroke="#f2d26f" stroke-width="9"/>
  </g>
</svg>
