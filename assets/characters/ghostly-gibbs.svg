<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Ghostly Gibbs</title>
  <desc id="desc">Cute ghost pirate guide with soft glow, puppet textures and a reassuring goofy smile.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="34%" r="70%">
      <stop offset="0%" stop-color="#d3fff6"/>
      <stop offset="100%" stop-color="#3ab79a"/>
    </radialGradient>
    <linearGradient id="ghost" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4fffd" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#c5fff2" stop-opacity="0.86"/>
    </linearGradient>
    <filter id="felt" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.84" numOctaves="2" seed="41" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="alphaNoise"><feFuncA type="table" tableValues="0 0.06"/></feComponentTransfer>
      <feBlend in="SourceGraphic" in2="alphaNoise" mode="multiply"/>
    </filter>
    <filter id="softshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#1d5f51" flood-opacity="0.34"/>
    </filter>
  </defs>

  <circle cx="512" cy="512" r="470" fill="url(#bg)"/>
  <circle cx="512" cy="512" r="458" fill="none" stroke="#d7ffe8" stroke-width="14" stroke-dasharray="7 16"/>

  <g filter="url(#softshadow)">
    <path d="M300 510 Q512 276 724 510 Q710 742 652 814 Q620 778 588 816 Q556 776 524 816 Q492 776 460 816 Q428 776 396 816 Q334 742 300 510Z" fill="url(#ghost)" filter="url(#felt)"/>

    <path d="M282 434 Q512 252 742 434 Q742 338 672 282 Q592 224 512 244 Q432 224 352 282 Q282 338 282 434Z" fill="#3a3741"/>
    <rect x="440" y="298" width="144" height="48" rx="14" fill="#e3be68"/>

    <ellipse cx="430" cy="530" rx="38" ry="50" fill="#ffffff"/>
    <ellipse cx="594" cy="530" rx="38" ry="50" fill="#ffffff"/>
    <circle cx="434" cy="534" r="17" fill="#133142"/>
    <circle cx="590" cy="534" r="17" fill="#133142"/>
    <circle cx="440" cy="524" r="7" fill="#fff"/>
    <circle cx="596" cy="524" r="7" fill="#fff"/>

    <ellipse cx="512" cy="596" rx="24" ry="18" fill="#9adfd2"/>
    <path d="M398 664 Q512 748 626 664" fill="#2e7d72" fill-opacity="0.78"/>
    <rect x="462" y="670" width="100" height="30" rx="10" fill="#f4fffb"/>

    <circle cx="314" cy="570" r="46" fill="#d9fff7" fill-opacity="0.88"/>
    <circle cx="710" cy="570" r="46" fill="#d9fff7" fill-opacity="0.88"/>
    <path d="M742 580 l70 -26" stroke="#d0fef2" stroke-width="12" stroke-linecap="round"/>
  </g>
</svg>
