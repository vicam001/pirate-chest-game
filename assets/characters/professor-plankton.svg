<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Professor Plankton</title>
  <desc id="desc">Inventive navigator pirate with puppet-felt textures, glowing monocle and a kind smile.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="34%" r="70%">
      <stop offset="0%" stop-color="#daffcf"/>
      <stop offset="100%" stop-color="#3d9a6a"/>
    </radialGradient>
    <linearGradient id="coat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3452a0"/>
      <stop offset="100%" stop-color="#1b2f61"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5d3b2"/>
      <stop offset="100%" stop-color="#e7b48f"/>
    </linearGradient>
    <filter id="felt" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.88" numOctaves="2" seed="5" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="alphaNoise"><feFuncA type="table" tableValues="0 0.08"/></feComponentTransfer>
      <feBlend in="SourceGraphic" in2="alphaNoise" mode="multiply"/>
    </filter>
    <filter id="softshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#13452b" flood-opacity="0.34"/>
    </filter>
  </defs>

  <circle cx="512" cy="512" r="470" fill="url(#bg)"/>
  <circle cx="512" cy="512" r="458" fill="none" stroke="#ddf5a0" stroke-width="14" stroke-dasharray="7 16"/>

  <g filter="url(#softshadow)">
    <ellipse cx="512" cy="792" rx="306" ry="168" fill="url(#coat)" filter="url(#felt)"/>
    <path d="M318 820 Q512 762 706 820" stroke="#e3efd2" stroke-width="10" stroke-linecap="round" stroke-dasharray="1 17"/>

    <ellipse cx="512" cy="560" rx="244" ry="222" fill="url(#skin)" filter="url(#felt)"/>

    <path d="M272 438 Q512 256 752 438 Q752 328 668 270 Q594 220 512 240 Q430 220 356 270 Q272 328 272 438Z" fill="#242630"/>
    <ellipse cx="512" cy="310" rx="188" ry="60" fill="#2f3140"/>
    <rect x="330" y="306" width="364" height="52" rx="18" fill="#1f2129"/>
    <path d="M668 268 C748 208, 810 248, 756 324" stroke="#f2f4ff" stroke-width="18" fill="none" stroke-linecap="round"/>

    <ellipse cx="430" cy="526" rx="38" ry="50" fill="#fffef8"/>
    <ellipse cx="594" cy="526" rx="38" ry="50" fill="#fffef8"/>
    <circle cx="434" cy="530" r="17" fill="#13263f"/>
    <circle cx="590" cy="530" r="17" fill="#13263f"/>
    <circle cx="440" cy="520" r="7" fill="#fff"/>
    <circle cx="596" cy="520" r="7" fill="#fff"/>

    <circle cx="594" cy="526" r="60" fill="none" stroke="#e8d075" stroke-width="8"/>
    <line x1="542" y1="544" x2="506" y2="562" stroke="#e8d075" stroke-width="5"/>

    <ellipse cx="512" cy="592" rx="25" ry="19" fill="#d98760"/>
    <path d="M372 616 Q434 582 478 622" stroke="#533322" stroke-width="11" fill="none" stroke-linecap="round"/>
    <path d="M546 622 Q592 582 652 616" stroke="#533322" stroke-width="11" fill="none" stroke-linecap="round"/>
    <path d="M402 662 Q512 744 622 662" fill="#8f2d23"/>
    <rect x="456" y="666" width="112" height="32" rx="10" fill="#fff4e2"/>

    <path d="M398 708 Q512 742 626 708" stroke="#f8ecd7" stroke-width="16" fill="none" stroke-linecap="round"/>
  </g>
</svg>
