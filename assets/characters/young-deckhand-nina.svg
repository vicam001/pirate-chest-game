<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Young Deckhand Nina</title>
  <desc id="desc">Brave young deckhand pirate with puppet-like stitching, bright smile and determined eyes.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="34%" r="70%">
      <stop offset="0%" stop-color="#dce9ff"/>
      <stop offset="100%" stop-color="#4e77d0"/>
    </radialGradient>
    <linearGradient id="coat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2a430"/>
      <stop offset="100%" stop-color="#ca701e"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8d5b4"/>
      <stop offset="100%" stop-color="#ebba95"/>
    </linearGradient>
    <filter id="felt" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.88" numOctaves="2" seed="31" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="alphaNoise"><feFuncA type="table" tableValues="0 0.08"/></feComponentTransfer>
      <feBlend in="SourceGraphic" in2="alphaNoise" mode="multiply"/>
    </filter>
    <filter id="softshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#203b78" flood-opacity="0.34"/>
    </filter>
  </defs>

  <circle cx="512" cy="512" r="470" fill="url(#bg)"/>
  <circle cx="512" cy="512" r="458" fill="none" stroke="#f9e79d" stroke-width="14" stroke-dasharray="7 16"/>

  <g filter="url(#softshadow)">
    <ellipse cx="512" cy="792" rx="300" ry="164" fill="url(#coat)" filter="url(#felt)"/>
    <path d="M330 820 Q512 764 694 820" stroke="#f7deaf" stroke-width="10" stroke-linecap="round" stroke-dasharray="1 17"/>

    <ellipse cx="512" cy="560" rx="236" ry="218" fill="url(#skin)" filter="url(#felt)"/>

    <path d="M230 414 Q512 238 794 414 Q774 326 706 274 Q616 210 512 230 Q408 210 318 274 Q250 326 230 414Z" fill="#3e2d25"/>
    <path d="M316 416 Q512 306 708 416" stroke="#5a4338" stroke-width="18" fill="none" stroke-linecap="round"/>
    <rect x="466" y="276" width="92" height="46" rx="14" fill="#f0d064"/>

    <ellipse cx="430" cy="530" rx="38" ry="50" fill="#fffef8"/>
    <ellipse cx="594" cy="530" rx="38" ry="50" fill="#fffef8"/>
    <circle cx="434" cy="534" r="17" fill="#14263f"/>
    <circle cx="590" cy="534" r="17" fill="#14263f"/>
    <circle cx="440" cy="524" r="7" fill="#fff"/>
    <circle cx="596" cy="524" r="7" fill="#fff"/>

    <ellipse cx="512" cy="594" rx="24" ry="18" fill="#dc8f63"/>
    <path d="M398 660 Q512 744 626 660" fill="#8f2c20"/>
    <rect x="456" y="666" width="112" height="32" rx="10" fill="#fff1dc"/>

    <circle cx="314" cy="568" r="46" fill="url(#skin)"/>
    <circle cx="710" cy="568" r="46" fill="url(#skin)"/>
    <path d="M274 586 l-72 14" stroke="#f2d984" stroke-width="12" stroke-linecap="round"/>
    <circle cx="194" cy="592" r="12" fill="#f2d984"/>
  </g>
</svg>
